<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forum Frontend Placeholder</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        color: #1f2937;
        background: #f8fafc;
      }

      main {
        width: min(640px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.5;
      }

      code {
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Frontend placeholder</h1>
      <p>The real frontend will be added later. The backend is exposed on <code>http://localhost:9000</code>.</p>
    </main>
  </body>
</html>
