name: forum-mse-2026

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forum}
      POSTGRES_USER: ${POSTGRES_USER:-forum_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forum_app_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: forum-backend:local
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/forum}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-forum_app}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-forum_app_password}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-at-least-32-chars}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
    ports:
      - "${BACKEND_PORT:-9000}:9000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9000/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-18080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend-placeholder:
    image: nginx:1.27-alpine
    profiles:
      - frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-14200}:80"
    volumes:
      - ./docker/frontend-placeholder:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
    name: forum-mse-2026-postgres-data
