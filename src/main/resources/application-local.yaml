spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:forum;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    locations: classpath:db/migration-h2
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: none

app:
  jwt:
    secret: local-development-secret-at-least-32-characters-long
    expiration-ms: 86400000
